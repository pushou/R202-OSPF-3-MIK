message: |
   EXAMEN - Rendez fonctionnel cette maquette OSPF (3 routeurs MikroTik) en configurant le Mikrotik3
   - Commandes utiles
    netlab connect Mikrotik3
    netlab status
    netlab addressing
    netlab validate
    netlab down (repart à zéro)
    nelab down --force --cleanup (force le redémarrage à zéro)
provider: clab
module: [ ospf ]
ospf.area: 0
plugin: [ clab_image_pull ]

defaults:
  devices:
    routeros7:
      clab:
        image: registry.iutbeziers.fr/mikrotik_routeros:7.18

nodes:
  Mikrotik1:
    device: routeros7
  Mikrotik2:
    device: routeros7
  Mikrotik3:
    device: routeros7
    skip_config: [ ospf ]
  client1:
    device: linux
    image: wbitt/network-multitool:latest
  client2:
    device: linux
    image: wbitt/network-multitool:latest

links:
- interfaces: [client1, Mikrotik1]

- interfaces: [client2,Mikrotik3]

- interfaces: [Mikrotik1,Mikrotik2]

- interfaces: [Mikrotik2,Mikrotik3]


validate:
  wait:
    description: attente de la convergence des routeurs
    wait: 30
  ping:
    description: Ping-based reachability test
    nodes: [client1]
    devices: [ linux ]
    plugin: ping('client2',af='ipv4',count=3)
  check_comp:
    description: Vérifier le nombre (8) de routes actives et la distance (110) des routes OSPF
    nodes: [ Mikrotik1 ]
    devices: [ routeros7 ]
    # Argument 1 : expected_count (routes actives), Argument 2 : expected_distance OSPF
    plugin: check_comp(8, 110)
  ospf_area_mk1:
    description: Vérifier l'aire OSPF de Mikrotik1 (area 0.0.0.0)
    nodes: [ Mikrotik1 ]
    devices: [ routeros7 ]
    plugin: ospf_area('0.0.0.0')
  ospf_area_mk2:
    description: Vérifier l'aire OSPF de Mikrotik2 (area 0.0.0.0)
    nodes: [ Mikrotik2 ]
    devices: [ routeros7 ]
    plugin: ospf_area('0.0.0.0')
  ospf_area_mk3:
    description: Vérifier l'aire OSPF de Mikrotik3 (area 0.0.0.0)
    nodes: [ Mikrotik3 ]
    devices: [ routeros7 ]
    plugin: ospf_area('0.0.0.0')
  ospf_rid_mk1:
    description: Vérifier le router-id OSPF de Mikrotik1 (10.0.0.1)
    nodes: [ Mikrotik1 ]
    devices: [ routeros7 ]
    plugin: ospf_rid('10.0.0.1')
  ospf_rid_mk2:
    description: Vérifier le router-id OSPF de Mikrotik2 (10.0.0.2)
    nodes: [ Mikrotik2 ]
    devices: [ routeros7 ]
    plugin: ospf_rid('10.0.0.2')
  ospf_rid_mk3:
    description: Vérifier le router-id OSPF de Mikrotik3 (10.0.0.3)
    nodes: [ Mikrotik3 ]
    devices: [ routeros7 ]
    plugin: ospf_rid('10.0.0.3')
  ospf_routes_mk1:
    description: Vérifier le nombre de routes OSPF sur Mikrotik1 (4 routes attendues)
    nodes: [ Mikrotik1 ]
    devices: [ routeros7 ]
    plugin: ospf_route_count(4)
  ospf_routes_mk2:
    description: Vérifier le nombre de routes OSPF sur Mikrotik2 (4 routes attendues)
    nodes: [ Mikrotik2 ]
    devices: [ routeros7 ]
    plugin: ospf_route_count(4)
  ospf_routes_mk3:
    description: Vérifier le nombre de routes OSPF sur Mikrotik3 (4 routes attendues)
    nodes: [ Mikrotik3 ]
    devices: [ routeros7 ]
    plugin: ospf_route_count(4)
